<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Term Memorizer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
            padding: 2rem 0;
        }
        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 90%;
            text-align: center;
            position: relative;
        }
        
        /* Updated Counter Styling */
        #counter-container {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            font-size: 0.9rem;
            color: #888;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        #card-jumper {
            width: 45px;
            padding: 0.2rem;
            font-size: 0.9rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
            color: #007bff;
            background-color: #f8f9fa;
            transition: border-color 0.3s, background-color 0.3s;
        }
        #card-jumper:focus {
            outline: none;
            border-color: #007bff;
            background-color: #fff;
        }
        /* Hide the default up/down arrows on number inputs */
        #card-jumper::-webkit-inner-spin-button, 
        #card-jumper::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }

        h1 {
            font-size: 1.5rem;
            color: #333;
            margin-top: 0;
        }
        #definition {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            color: #555;
            line-height: 1.5;
        }
        #hint {
            font-size: 1.8rem;
            font-family: monospace;
            letter-spacing: 4px;
            margin-bottom: 2rem;
            color: #007bff;
        }
        input[type="text"] {
            width: 80%;
            padding: 0.8rem;
            font-size: 1.1rem;
            border: 2px solid #ccc;
            border-radius: 6px;
            margin-bottom: 1rem;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            border-color: #007bff;
            outline: none;
        }
        #feedback {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            min-height: 1.5em;
        }
        .correct { color: #28a745; font-weight: bold; }
        .incorrect { color: #dc3545; }
        .correct-answer-text { font-weight: bold; color: #333; font-size: 1.2rem; display: block; margin-top: 0.5rem;}
        
        button {
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover { background-color: #0056b3; }

        /* Review List Styling */
        .list-container {
            margin-top: 2rem;
            display: none;
        }
        .list-container h2 {
            font-size: 1.2rem;
            color: #dc3545;
            margin-top: 0;
            border-bottom: 2px solid #fee2e2;
            padding-bottom: 0.5rem;
        }
        ul {
            list-style-type: none;
            padding: 0;
            text-align: left;
            margin: 0;
        }
        li {
            background: #fdfdfd;
            margin: 0.5rem 0;
            padding: 0.8rem 1rem;
            border-radius: 6px;
            border: 1px solid #eee;
            font-size: 1.1rem;
            display: flex;
            flex-direction: column;
        }
        .li-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }
        .btn-group {
            display: flex;
            gap: 0.5rem;
        }
        .def-btn {
            background: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            width: 32px;
            height: 32px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.1rem;
            padding: 0;
            transition: background-color 0.2s;
        }
        .def-btn:hover { background: #218838; }
        .delete-btn {
            background: #ff4d4d;
            color: white;
            border: none;
            border-radius: 6px;
            width: 32px;
            height: 32px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.4rem;
            padding: 0;
            line-height: 1;
            transition: background-color 0.2s;
        }
        .delete-btn:hover { background: #cc0000; }
        .term-def-display {
            display: none;
            margin-top: 0.8rem;
            padding: 0.8rem;
            background-color: #f1f3f5;
            border-radius: 6px;
            font-size: 1rem;
            color: #444;
            line-height: 1.4;
            border-left: 4px solid #28a745;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="counter-container">
        Card <input type="number" id="card-jumper" min="1" title="Type a number and press Enter to jump"> of <span id="total-cards"></span>
    </div>
    
    <h1>Study Flashcards</h1>
    <p id="definition">Loading...</p>
    <p id="hint"></p>
    <input type="text" id="answer-input" placeholder="Type the term and press Enter..." autocomplete="off">
    <div id="feedback"></div>
    <button id="next-btn" style="display: none;">Next Term</button>
</div>

<div class="container list-container" id="incorrect-container">
    <h2>Words to Review</h2>
    <ul id="incorrect-list"></ul>
</div>

<script>
    const termsList = [
        { term: "Second language (L2)", definition: "Any additional language acquisition beyond the first (L1), including both \"foreign\" language learning and also subsequent (third, fourth, etc.) languages. (Page 2)" },
        { term: "Second language acquisition (SLA)", definition: "A generic term referring to L2 acquisition in both natural and instructional settings, as well as to both \"foreign\" language learning and \"second\" language learning. (Page 2)" },
        { term: "Learner characteristics", definition: "The traits of the students being taught, including their ethnic, linguistic, and religious heritage, native languages, levels of education, socioeconomic characteristics, life experiences, intellectual capacities, and personality. (Page 2)" },
        { term: "First language (L1)", definition: "The learner's native language. (Page 3)" },
        { term: "Natural environments", definition: "Contexts where a good deal of SLA successfully takes place outside of any educational context or classroom. (Page 3)" },
        { term: "Linguistic factors", definition: "The system of the language being learned, including the relevant differences and similarities between a learner's first language and second language, and the properties of the L2 that might be difficult to master. (Page 3)" },
        { term: "Learning processes", definition: "The mental or intellectual steps involved in SLA, including the strategies available to a learner and the optimal interrelationship of mental, emotional, and physical processes. (Page 3)" },
        { term: "Age and acquisition", definition: "The research area focusing on differences between children and adults in language learning, examining whether age makes a difference and how developmental changes affect SLA. (Page 3)" },
        { term: "Instructed SLA", definition: "The acquisition of a second language that takes place within an educational context or classroom, raising questions about the effects of varying methodological approaches, textbooks, materials, teacher styles, and institutional factors. (Page 3-4)" },
        { term: "Classroom instruction factors", definition: "The variables in instructed SLA such as the effects of varying methodological approaches, textbooks, materials, teacher styles, and institutional factors. (Page 3-4)" },
        { term: "Foreign language learning", definition: "Learning an L2 in a context where it is heard and spoken only in an artificial environment, such as in a language classroom, or an instructional video. (Page 4)" },
        { term: "Second language learning", definition: "Learning an L2 within the cultural and linguistic milieu of the second language. (Page 4)" },
        { term: "Artificial environment", definition: "Settings such as language classrooms or instructional videos where a \"foreign\" language is typically heard and spoken. (Page 4)" },
        { term: "Context", definition: "The environment in which a language is learned, whether it is within the cultural and linguistic milieu of the L2, an artificial foreign language environment, or influenced by the sociopolitical conditions and language policies of a particular country. (Page 4)" },
        { term: "Purpose", definition: "The reasons why learners are attempting to acquire a second language, such as for a successful career, passing a requirement, or identifying closely with the target culture. (Page 4)" },
        { term: "Normal science", definition: "A process of puzzle solving in which part of the task of the scientist, in this case the teacher, is to discover the pieces and then to fit the pieces together. (Page 5)" },
        { term: "Paradigm", definition: "An interlocking design, a model, or a theory of SLA. (Page 5)" },
        { term: "Eclectic understanding", definition: "The realization that no single theory or hypothesis will provide a magic formula for all learners in all contexts. (Page 5)" },
        { term: "Enlightened conclusions", definition: "Being critical in considering the merit of various models, theories, and research findings in SLA. (Page 5)" },
        { term: "Cautious approach", definition: "The practice of not accepting every claim in language learning as truth just because someone fervently asserts it to be factual. (Page 5)" },
        { term: "Definition", definition: "A statement that captures the key features of a concept. (Page 6)" },
        { term: "Theory", definition: "An \"extended\" definition that elaborates on all the facets of a concept. (Page 6)" },
        { term: "Language (Merriam-Webster definition)", definition: "A systematic means of communicating ideas or feelings by the use of conventionalized signs, sounds, gestures, or marks having understood meanings. (Page 6)" },
        { term: "Language (Pinker's definition)", definition: "A complex, specialized skill, which develops in the child spontaneously, without conscious effort or formal instruction, is deployed without awareness of its underlying logic, is qualitatively the same in every individual, and is distinct from more general abilities to process information or behave intelligently. (Page 6)" },
        { term: "Creativity of language", definition: "A concept noted by Ron Scollon, alongside the presumed primacy of speech over writing and the universality of language among human beings. (Page 6-7)" },
        { term: "Phonetics, phonology, morphology, syntax, discourse analysis, lexical analysis", definition: "Subfields of research related to the concept that language is systematic. (Page 7)" },
        { term: "Semiotics, semantics, philosophy & history of language, psycholinguistics", definition: "Subfields of research related to the concept that language uses arbitrary symbols. (Page 7)" },
        { term: "Writing systems, orthography, nonverbal communication", definition: "Subfields of research related to the concept that language uses symbols that are primarily vocal but may also be visual. (Page 7)" },
        { term: "Pragmatics, sociolinguistics, cognitive linguistics", definition: "Subfields of research related to the concept that language uses symbols that have conventionalized meanings. (Page 7)" },
        { term: "Sentence processing, conversation analysis", definition: "Subfields of research related to the concept that language is used for communication. (Page 7)" },
        { term: "Sociocultural analysis, culture pragmatics, dialectology, bilingualism", definition: "Subfields of research related to the concept that language operates in a speech community. (Page 7)" },
        { term: "Innateness, genetics, neurolinguistics, animal communication", definition: "Subfields of research related to the concept that language is essentially human, but not limited to humans. (Page 7)" },
        { term: "Universal Grammar, emergentism, cross-cultural analysis", definition: "Subfields of research related to the concept that language has universal characteristics. (Page 7)" },
        { term: "Universal characteristics", definition: "A defining trait of language representing concepts like Universal Grammar, innateness, emergentism, neurolinguistics, and cross-cultural analysis. (Page 7)" },
        { term: "Systematic", definition: "A key characteristic of language indicating it has structure, related to subfields like phonetics, phonology, morphology, syntax, discourse analysis, and lexical analysis. (Page 7)" },
        { term: "Arbitrary symbols", definition: "The concept that language uses symbols without an inherent connection to their meaning, studied in semiotics, semantics, philosophy, and psycholinguistics. (Page 7)" },
        { term: "Conventionalized meanings", definition: "The idea that language symbols have understood, agreed-upon meanings within a community, related to semantics, pragmatics, sociolinguistics, and cognitive linguistics. (Page 7)" },
        { term: "Speech community", definition: "The social context in which a language operates, studied through sociolinguistics, sociocultural analysis, dialectology, and bilingualism. (Page 7)" },
        { term: "Learning (Dictionary definition)", definition: "Acquiring knowledge of a subject or a skill by study, experience, or instruction. (Page 8)" },
        { term: "Learning (Educational psychologist definition)", definition: "A change in an individual caused by experience. (Page 8)" },
        { term: "Teaching", definition: "Guiding and facilitating learning, enabling a person to learn, and setting the conditions for learning; showing or helping someone to learn how to do something. (Page 8)" },
        { term: "Acquisition or \"adding\"", definition: "A component of learning where one gains information or skills. (Page 8)" },
        { term: "Retention of information or skills", definition: "A component of learning involving the keeping of acquired knowledge. (Page 8)" },
        { term: "Storage systems, memory, and cognitive organization", definition: "The mental systems involved in the learning process. (Page 8)" },
        { term: "Active, conscious focus, and subconscious attention", definition: "The application of mental awareness involved in learning. (Page 8)" },
        { term: "Forgetting", definition: "The process that makes relatively permanent learning subject to loss over time. (Page 8)" },
        { term: "Practice or reinforced practice", definition: "The process that learning is a result of. (Page 8)" },
        { term: "Change in behavior", definition: "The ultimate result of learning. (Page 8)" },
        { term: "Operant conditioning", definition: "A process of learning through a carefully paced program of reinforcement, associated with B. F. Skinner. (Page 8)" },
        { term: "Deductive process", definition: "Presenting rules, lists, and charts to students rather than letting them discover those rules inductively. (Page 8-9)" },
        { term: "Inductive process", definition: "Letting students \"discover\" rules on their own rather than presenting them with rules, lists, and charts. (Page 9)" },
        { term: "Theory of teaching", definition: "Your theory of learning \"stood on its head\"; an extended definition that spells out governing principles for choosing certain methods and techniques. (Page 9)" },
        { term: "Structural or descriptive linguistics", definition: "A school of linguistics in the 1940s and 1950s that prided itself in a rigorous application of the scientific observation of human languages, focusing only on publicly observable responses. (Page 9-10)" },
        { term: "Publicly observable responses", definition: "The only subject of investigation permitted by the structuralist school of linguistics and behavioral psychology. (Page 10)" },
        { term: "Explanatory fiction", definition: "The behavioral paradigm's term for any notion of \"idea\" or \"meaning\" which could not be objectively perceived, recorded, and measured. (Page 10)" },
        { term: "Charles Fries", definition: "Best modeled structural linguistics in the classroom with \"structural drills\" and \"pattern practices\" that eventually evolved into the Audiolingual Method. (Page 10)" },
        { term: "Generative-transformational linguistics", definition: "Emerged in the 1960s through the influence of Noam Chomsky, trying to show that human language cannot be scrutinized simply in terms of observable stimuli and responses or raw data. (Page 10-11)" },
        { term: "Descriptive adequacy", definition: "The level of generative linguistics focused solely on describing language. (Page 11)" },
        { term: "Explanatory level of adequacy", definition: "A principled basis, independent of any particular language, for the selection of the descriptively adequate grammar of each language. (Page 11)" },
        { term: "Parole", definition: "Ferdinand de Saussure's term for the outward manifestation of language, corresponding to what Skinner \"observes\" and what Chomsky called performance. (Page 11)" },
        { term: "Langue", definition: "Ferdinand de Saussure's term akin to the concept of competence, or our underlying and unobservable language ability. (Page 11)" },
        { term: "Performance", definition: "Noam Chomsky's term corresponding to Saussure's parole; the outward manifestation of language. (Page 11)" },
        { term: "Competence", definition: "Noam Chomsky's term corresponding to Saussure's langue; our underlying and unobservable language ability. (Page 11)" },
        { term: "Cognitive psychology", definition: "An approach asserting that meaning, understanding, and knowing are significant data for psychological study, discovering psychological principles of organization and functioning rather than mechanistic stimulus-response connections. (Page 11)" },
        { term: "David Ausubel", definition: "Cognitive psychologist who felt that behaviorists dangerously oversimplified highly complex psychological phenomena. (Page 11)" },
        { term: "Cognitivism", definition: "A school of thought characterizing assertions that the mind/brain is, for all intents and purposes, the necessary and sufficient locus of human thought and learning. (Page 11)" },
        { term: "Unobservable language ability", definition: "The underlying linguistic knowledge represented by the concepts of langue or competence. (Page 11)" },
        { term: "Constructivism", definition: "An integration of linguistic, psychological, and sociological paradigms with an emphasis on social interaction and the discovery, or construction, of meaning. (Page 12)" },
        { term: "Cognitive constructivism", definition: "Places emphasis on the importance of learners constructing their own representation of reality, individually discovering and transforming complex information to make it their own. (Page 12)" },
        { term: "Piaget's learning process", definition: "Learning is a developmental process that involves change, self-generation, and construction, each building on prior learning experiences. (Page 12)" },
        { term: "Social constructivism", definition: "Emphasizes the importance of social interaction and cooperative learning in ultimate attainment, championed by Lev Vygotsky. (Page 12)" },
        { term: "Cooperative learning", definition: "A key factor in social constructivism and ultimate attainment alongside social interaction. (Page 12)" },
        { term: "Meaning-making", definition: "Described by Vygotsky as being socially constructed and emerging out of a child's social interactions with their environment. (Page 12-13)" },
        { term: "Zone of proximal development (ZPD)", definition: "The distance between learners' existing developmental state and their potential development; encompasses tasks that a learner has not yet learned but is capable of learning with appropriate stimuli or assistance of more competent peers or adults. (Page 13)" },
        { term: "Biological timetables", definition: "A basic concept in Piaget's theory where predetermined stages of development set a precondition or readiness for learning. (Page 13)" },
        { term: "Mikhail Bakhtin", definition: "Russian literary theorist who contended that language is immersed in a social and cultural context, and its central function is to serve as a medium of communication. (Page 13)" },
        { term: "Language socialization paradigm", definition: "A new synthesis that involves a reconsideration of mind, language, and epistemology, and a recognition that cognition originates in social interaction and is shaped by cultural and sociopolitical processes. (Page 13)" },
        { term: "Structural Linguistics and Behavioral Psychology themes", definition: "Description, Observable performance, Empiricism, Scientific method, Conditioning, Reinforcement. (Page 14)" },
        { term: "Generative Linguistics and Cognitive Psychology themes", definition: "Acquisition, Innateness, Language competence, Deep structure, Interlanguage, Systematicity, Variability. (Page 14)" },
        { term: "Constructivism themes", definition: "Interactive discourse, Sociocultural factors, Construction of identity, ZPD, Cooperative learning, Discovery learning. (Page 14)" },
        { term: "Anomaly", definition: "A period of doubt, uncertainty, and questioning of prevailing theory. (Page 14)" },
        { term: "Structure of scientific revolutions", definition: "Described by Thomas Kuhn as a cyclical pattern where a successful paradigm is followed by a period of anomaly, then crisis, and finally a new paradigm is put together. (Page 14-15)" },
        { term: "Crisis", definition: "The \"fall\" of the existing paradigm with all the professional insecurity that comes with it. (Page 14-15)" },
        { term: "Classical Method", definition: "A method for teaching Latin and Greek focusing on grammatical rules, memorization of vocabulary and grammatical forms, translation of texts, and performance of written exercises. (Page 15)" },
        { term: "Mental gymnastics", definition: "The means through which Latin was thought to promote intellectuality. (Page 15)" },
        { term: "Grammar Translation Method", definition: "The late nineteenth-century name for the Classical Method; involves explanations of grammar points, memorization of lists, and exercises in translation. (Page 15)" },
        { term: "Reading knowledge", definition: "Often the primary goal of foreign language instruction before the twentieth century and in the Grammar Translation Method, rather than oral or aural communication. (Page 15-16)" },
        { term: "François Gouin's Series Method", definition: "An early attempt at the end of the 19th century to reform language teaching methodology using observational research. (Page 16)" },
        { term: "Changing winds and shifting sands", definition: "Albert Marckwardt's metaphor for the cyclical pattern in which a new paradigm of teaching methodology emerges about every quarter of a century. (Page 16-17)" },
        { term: "Pendulum swings", definition: "A metaphor used to describe trends across the decades, such as focus on accuracy vs. focus on fluency, separation of skills vs. integration of skills, and teacher-centered vs. learner-centered approaches. (Page 17)" },
        { term: "Audiolingual Method (ALM)", definition: "A revolutionary method of the late 1940s and 1950s that overemphasized oral production drills, essentially springing from behavioral theories of learning of the time. (Page 17)" },
        { term: "Direct Method", definition: "The predecessor to the Audiolingual method by almost half a century, from which ALM borrowed tenets. (Page 17)" },
        { term: "Cognitive code", definition: "The focus on rules advocated by ALM critics as cognitive psychology increased in popularity, which to some smacked of a return to Grammar Translation. (Page 17)" },
        { term: "Symbiotic relationship", definition: "The connection since the early 1970s between theoretical disciplines and teaching methodology. (Page 17)" },
        { term: "Communicative competence", definition: "A concept linguists increasingly searched to explain, focusing on the interactive, sociocultural process of language acquisition. (Page 17)" },
        { term: "Self-efficacy", definition: "A methodological innovation emphasizing a student's belief in their capability to learn, developed alongside construction of identity. (Page 17)" },
        { term: "Focus on accuracy vs focus on fluency", definition: "One of the pedagogical pendulum swings reflecting shifting priorities in language teaching methodologies over the decades. (Page 17)" },
        { term: "Separation of skills vs integration of skills", definition: "A shifting trend in language teaching methodology concerning whether to teach reading, writing, listening, and speaking separately or together. (Page 17)" },
        { term: "Teacher-centered vs learner-centered approaches", definition: "The methodological pendulum swing between instruction primarily directed by the teacher and instruction focused on the active role and discovery of the student. (Page 17)" },
        { term: "Major river metaphor", definition: "Mitchell and Vidal's description of the journey of language teaching trends across time, constantly flowing and fed by many sources like rivers, streams, and springs. (Page 17)" },
        { term: "Communicative Language Teaching (CLT)", definition: "An eclectic blend of previous methods into the best of what a teacher can provide in authentic uses of the L2 in the classroom; teaching students to communicate genuinely, spontaneously, and meaningfully. (Page 18)" },
        { term: "Orthodoxies", definition: "Proclaimed \"best\" methods which are absent in current language teaching practices because they are too narrow and constrictive. (Page 18)" },
        { term: "Principled eclecticism", definition: "An approach in which teachers develop a principled basis to choose particular designs and techniques for teaching an L2 in a specific context, recognizing that every learner, teacher, and context is unique. (Page 18)" },

        { term: "First language acquisition", definition: "The amazing capacity for acquiring one's native language within the first few years of life. (Page 21)" },
        { term: "Telegraphic utterances", definition: "Sentences appearing in two-word and three-word combinations, such as \"all gone milk\" or \"shoe off,\" commonly produced around eighteen months of age. (Page 22)" },
        { term: "Extreme behaviorist position", definition: "A view claiming that children come into the world with a tabula rasa, a clean slate, bearing no preconceived notions about the world or about language. (Page 23)" },
        { term: "Tabula rasa", definition: "A clean slate; a condition where children come into the world bearing no preconceived notions about the world or about language. (Page 23)" },
        { term: "Behavioral perspective", definition: "A perspective that easily explains linguistic exchanges as the result of an emitted or stimulated response that is immediately rewarded, thereby encouraging further linguistic attempts. (Page 23)" },
        { term: "Publicly observable responses", definition: "Immediately perceptible aspects of linguistic behavior and the associations between those responses and perceived rewards in the surrounding world. (Page 24)" },
        { term: "Habitual or conditioned response", definition: "A particular response that becomes a habit after it is rewarded. (Page 24)" },
        { term: "Operant conditioning", definition: "Conditioning in which the organism emits a response, or operant, without necessarily observable stimuli, and that operant is maintained by reinforcement. (Page 24)" },

        { term: "B.F. Skinner", definition: "A researcher who constructed one of the earliest attempts at a behavioral model of language acquisition, embodied in his classic book, Verbal Behavior. (Page 24)" },

        { term: "Generative framework", definition: "A framework that approached data with few preconceived notions about what the child's language ought to be, probing for internally consistent rule systems. (Page 28)" },
        { term: "Pivot grammars", definition: "Early grammars of child language which observed that a child's first two-word utterances seemed to manifest two separate word classes, rather than words thrown together at random. (Page 28)" },
